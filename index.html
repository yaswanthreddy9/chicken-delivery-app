\<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{
margin:0;
font-family:sans-serif;
background:#fafafa;
}

/* HEADER */
header{
display:flex;
align-items:center;
gap:10px;
padding:12px;
background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:sticky;
top:0;
z-index:100;
}

/* SIDEBAR */
.sidebar{
position:fixed;
top:0;
left:-250px;
width:250px;
height:100%;
background:white;
box-shadow:2px 0 6px rgba(0,0,0,0.2);
transition:0.3s;
z-index:200;
}

.sidebar.open{left:0}

.menu-item{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* OVERLAY */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:150;
}

/* SECTION */
.section{
padding:10px;
}

.title{
font-weight:bold;
font-size:18px;
margin-bottom:10px;
}

/* ITEM CARD */
.item{
display:flex;
justify-content:space-between;
background:white;
padding:10px;
margin-bottom:10px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* LEFT */
.info{
width:60%;
}

.name{
font-weight:bold;
margin-bottom:5px;
}

.price{
color:#16a34a;
font-weight:bold;
margin-bottom:5px;
}

.desc{
font-size:12px;
color:#666;
}

/* RIGHT */
.right{
width:35%;
text-align:center;
}

.right img{
width:100%;
height:100px;
object-fit:cover;
border-radius:10px;
}

/* ADD BUTTON */
.add-btn{
margin-top:-20px;
background:white;
border:1px solid #ff4d4d;
color:#ff4d4d;
padding:5px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:25px;
display:none;
}
</style>
</head>

<body>

<header>
<span onclick="openMenu()">☰</span>
<div style="flex:1">Chicken Delivery</div>
<span onclick="login()">👤</span>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
<div class="menu-item" onclick="showOrders()">Orders</div>
<div class="menu-item" onclick="logout()">Logout</div>
</div>

<div class="section">
<div class="title">Recommended for you</div>
<div id="items"></div>
</div>

<div id="cart" class="cart"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
});

const db=firebase.firestore();
const auth=firebase.auth();

/* MENU */
function openMenu(){
sidebar.classList.add("open");
overlay.style.display="block";
}

function closeMenu(){
sidebar.classList.remove("open");
overlay.style.display="none";
}

/* AUTH */
function login(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
function logout(){
auth.signOut();
}

/* CART */
let cart=[];

/* LOAD ITEMS FROM ADMIN */
db.collection("items").onSnapshot(snap=>{
items.innerHTML="";

snap.forEach(doc=>{
let i=doc.data();

items.innerHTML+=`
<div class="item">
<div class="info">
<div class="name">${i.name}</div>
<div class="price">₹${i.price}</div>
<div class="desc">${i.desc || "Delicious food item"}</div>
</div>

<div class="right">
<img src="${i.image}" onerror="this.src='https://via.placeholder.com/150'">
<button class="add-btn" onclick="add('${doc.id}','${i.name}',${i.price})">ADD</button>
</div>
</div>
`;
});
});

/* ADD */
function add(id,name,price){
cart.push({id,name,price});
updateCart();
}

function updateCart(){
if(cart.length===0){
cart.style.display="none";
return;
}

let total=cart.reduce((a,b)=>a+b.price,0);

cart.style.display="block";
cart.innerHTML=`${cart.length} items • ₹${total}`;
}

/* ORDERS */
function showOrders(){
alert("Orders page coming next step");
}
</script>

</body>
</html>
