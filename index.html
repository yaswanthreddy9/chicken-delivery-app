<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chicken Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#16a34a;
color:white;
padding:15px;
font-size:18px;
}

/* CONTAINER */
.container{padding:15px}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

/* CARD */
.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* BUTTON */
button{
padding:8px;
border:none;
border-radius:6px;
background:#16a34a;
color:white;
margin-top:5px;
cursor:pointer;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:10px 20px;
border-radius:30px;
display:none;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.box{
background:white;
padding:15px;
border-radius:10px;
width:90%;
max-width:400px;
}
</style>
</head>

<body>

<header>Chicken Delivery</header>

<div class="container">

<h3>Menu</h3>
<div id="itemsList" class="grid"></div>

<h3>Your Orders</h3>
<div id="ordersList"></div>

</div>

<div id="cartBtn" class="cart" onclick="placeOrder()">Place Order</div>

<!-- MAP MODAL -->
<div id="mapModal" class="modal">
<div class="box">
<h3>Live Tracking</h3>
<div id="map" style="height:300px;"></div>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLds9mdWrFd1ap158yji-WzxRatQcYFQA"></script>

<script>
const config={
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
};

firebase.initializeApp(config);
const db=firebase.firestore();

let cart=[];
let map=null;
let marker=null;

/* LOAD ITEMS (REALTIME) */
db.collection("items").onSnapshot(snap=>{
itemsList.innerHTML="";
snap.forEach(doc=>{
let i=doc.data();

itemsList.innerHTML+=`
<div class="card">
<b>${i.name}</b><br>
₹${i.price}<br>
<button onclick="addItem('${i.name}',${i.price})">ADD</button>
</div>`;
});
});

/* CART */
function addItem(name,price){
cart.push({name,price});
cartBtn.style.display="block";
cartBtn.innerText=`${cart.length} items • Place Order`;
}

/* PLACE ORDER */
function placeOrder(){

if(cart.length===0){
alert("Cart empty");
return;
}

db.collection("orders").add({
items:cart,
status:"pending",
address:"User Address",
payment:"cod",
createdAt:new Date()
});

alert("Order placed!");

cart=[];
cartBtn.style.display="none";
}

/* LOAD ORDERS (REALTIME) */
db.collection("orders").onSnapshot(snap=>{
ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

ordersList.innerHTML+=`
<div class="card">
<b>Order:</b> ${doc.id.slice(0,6)}<br>
<b>Status:</b> ${o.status}<br>

${o.status==="out for delivery"
? `<button onclick="trackOrder('${doc.id}')">Track Order</button>`
: ""}

</div>`;
});
});

/* TRACK ORDER */
function trackOrder(orderId){

mapModal.style.display="flex";

db.collection("orders").doc(orderId)
.onSnapshot(doc=>{
let d=doc.data();

if(!d.location) return;

let lat=d.location.lat;
let lng=d.location.lng;

if(!map){
map = new google.maps.Map(document.getElementById("map"), {
center:{lat,lng},
zoom:15
});

marker = new google.maps.Marker({
position:{lat,lng},
map:map
});
}else{
marker.setPosition({lat,lng});
map.setCenter({lat,lng});
}
});
}

/* CLOSE MODAL */
window.onclick=e=>{
if(e.target.classList.contains("modal")){
e.target.style.display="none";
}
};
</script>

</body>
</html>
