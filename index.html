<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:sans-serif;background:#f5f5f5}
header{display:flex;align-items:center;padding:12px;background:white;box-shadow:0 2px 6px rgba(0,0,0,0.1);position:sticky;top:0}
.login-btn{background:#16a34a;color:white;border:none;padding:6px 14px;border-radius:20px}

.item{display:flex;background:white;margin:10px;padding:10px;border-radius:14px}
.left{width:65%}
.right{width:35%;text-align:center}
.right img{width:100%;height:110px;border-radius:10px;object-fit:cover}

.add{border:1px solid red;color:red;background:white;padding:5px 12px;border-radius:8px;margin-top:-20px}
.qty{display:flex;justify-content:center;gap:10px;margin-top:-20px}
.qty button{background:#16a34a;color:white;border:none;border-radius:5px}

.cartbar{position:fixed;bottom:15px;left:50%;transform:translateX(-50%);background:#16a34a;color:white;padding:12px 20px;border-radius:25px;display:none}

.page{display:none}
.active{display:block;padding:10px}
.card{background:white;padding:10px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<div style="flex:1;text-align:center;font-weight:bold">Chicken Delivery</div>
<button id="authBtn" class="login-btn" onclick="handleAuth()">Login</button>
</header>

<div id="home" class="page active">
<div id="items"></div>
</div>

<div id="cartPage" class="page">
<h3>Cart</h3>
<div id="cartItems"></div>
<input id="address" placeholder="Address">
<button onclick="placeOrder()">Place Order</button>
</div>

<div id="orders" class="page">
<h3>Your Orders</h3>
<div id="orderList"></div>
</div>

<div id="cartBar" class="cartbar" onclick="go('cartPage')"></div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
});

const db=firebase.firestore();
const auth=firebase.auth();

/* LOGIN */
function handleAuth(){
auth.currentUser ? logout() : login();
}

function login(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
.catch(()=>auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()));
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
if(user){
authBtn.innerText="Logout";
loadOrders(user.uid);
}else{
authBtn.innerText="Login";
orderList.innerHTML="<p>Please login</p>";
}
});

/* NAV */
function go(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
}

/* CART */
let cart={};

function add(id,name,price){
if(!cart[id]) cart[id]={name,price,qty:1};
else cart[id].qty++;
render();
}

function inc(id){cart[id].qty++;render();}
function dec(id){cart[id].qty--;if(cart[id].qty<=0) delete cart[id];render();}

function render(){
document.querySelectorAll(".item").forEach(el=>{
let id=el.dataset.id;
let c=cart[id];
let box=el.querySelector(".action");

box.innerHTML=c?
`<div class="qty">
<button onclick="dec('${id}')">-</button>${c.qty}
<button onclick="inc('${id}')">+</button>
</div>`
:
`<button class="add" onclick="add('${id}','${el.dataset.name}',${el.dataset.price})">ADD</button>`;
});

let total=0,count=0;
for(let k in cart){
total+=cart[k].price*cart[k].qty;
count+=cart[k].qty;
}

cartBar.style.display=count?"block":"none";
cartBar.innerText=`${count} items • ₹${total}`;

cartItems.innerHTML="";
for(let k in cart){
let i=cart[k];
cartItems.innerHTML+=`<div class="card">${i.name} x ${i.qty}</div>`;
}
}

/* LOAD ITEMS */
db.collection("items").onSnapshot(snap=>{
items.innerHTML="";
snap.forEach(doc=>{
let i=doc.data();
items.innerHTML+=`
<div class="item" data-id="${doc.id}" data-name="${i.name}" data-price="${i.price}">
<div class="left"><b>${i.name}</b><br>₹${i.price}</div>
<div class="right">
<img src="${i.image}" onerror="this.src='https://via.placeholder.com/150'">
<div class="action"></div>
</div>
</div>`;
});
render();
});

/* PLACE ORDER (FIXED) */
function placeOrder(){
let user=auth.currentUser;
if(!user){alert("Login first");return;}

db.collection("orders").add({
userId:user.uid,
userName:user.displayName,
items:Object.values(cart),
address:address.value || "Not provided",
status:"pending",
createdAt:Date.now()  // 🔥 FIX: always valid
});

cart={};
render();
go("orders");
}

/* LOAD ORDERS (FIXED) */
function loadOrders(uid){
db.collection("orders")
.where("userId","==",uid)
.onSnapshot(snap=>{

let orders=[];

snap.forEach(doc=>{
let d=doc.data();
orders.push({
id:doc.id,
...d
});
});

/* SORT manually (fix for timestamp issue) */
orders.sort((a,b)=>b.createdAt - a.createdAt);

orderList.innerHTML="";

orders.forEach(o=>{
orderList.innerHTML+=`
<div class="card">
<b>Order:</b> ${o.id.slice(0,6)}<br>
<b>Status:</b> ${o.status}<br>
<button onclick="alert('Tracking coming next')">Track</button>
</div>`;
});

});
}
</script>

</body>
</html>
