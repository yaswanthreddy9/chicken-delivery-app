<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chicken Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
  background:#16a34a;
  color:white;
  padding:14px;
  display:flex;
  gap:10px;
  align-items:center;
}

/* OVERLAY */
#overlay{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.4);
  display:none;
  z-index:999;
}

/* SIDEBAR */
.menu{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:white;
  transition:0.3s;
  z-index:1000;
}
.menu.open{left:0}

.menu-header{
  background:#16a34a;
  color:white;
  padding:20px;
}

.menu-item{
  padding:15px;
  border-bottom:1px solid #eee;
  cursor:pointer;
}

/* GRID */
.container{padding:15px}
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:12px;
}
.card{
  background:white;
  border-radius:10px;
  padding:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* CART */
.cart{
  position:fixed;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  background:#16a34a;
  color:white;
  padding:10px 20px;
  border-radius:30px;
  display:none;
}

/* MODAL */
.modal{
  position:fixed;
  top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,0.5);
  display:none;
  justify-content:center;
  align-items:center;
}
.box{
  background:white;
  padding:20px;
  border-radius:10px;
  width:90%;
  max-width:400px;
}

input,select{
  width:100%;
  padding:10px;
  margin:6px 0;
  border-radius:6px;
  border:1px solid #ccc;
}

button{
  padding:10px;
  border:none;
  border-radius:6px;
  background:#16a34a;
  color:white;
  cursor:pointer;
}
</style>
</head>

<body>

<header>
<span onclick="toggleMenu()">☰</span>
Chicken Delivery
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div id="menu" class="menu">
<div class="menu-header">
<h3 id="userName">Guest</h3>
<p id="userEmail">Not logged in</p>
</div>

<div class="menu-item" id="loginBtn" onclick="googleLogin()">🔐 Sign in with Google</div>
<div class="menu-item" onclick="openOrders()">📦 Orders</div>
<div class="menu-item" id="logoutBtn" onclick="logout()" style="display:none">🚪 Logout</div>
</div>

<div class="container">
<div id="items" class="grid"></div>
</div>

<div id="cartBtn" class="cart" onclick="openCart()"></div>

<!-- CART -->
<div id="cartPopup" class="modal">
<div class="box">
<h3>Cart</h3>
<div id="summary"></div>
<button onclick="nextStep()">Next</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
<div class="box">
<input id="address" placeholder="Address">
<select id="payment">
<option value="cod">Cash on Delivery</option>
<option value="online">Pay Online</option>
</select>
<button onclick="confirmOrder()">Confirm</button>
</div>
</div>

<!-- ORDERS -->
<div id="ordersPanel" class="modal">
<div class="box">
<h3>Your Orders</h3>
<div id="ordersList"></div>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
const config={
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
};

firebase.initializeApp(config);
const db=firebase.firestore();
const auth=firebase.auth();

let cart=[],currentUser=null;

/* DEMO ITEMS */
const items=[
{name:"Chicken Biryani",price:250},
{name:"Fried Chicken",price:180}
];

/* RENDER ITEMS */
const itemsDiv=document.getElementById("items");
items.forEach(i=>{
itemsDiv.innerHTML+=`
<div class="card">
<b>${i.name}</b><br>₹${i.price}
<br><br>
<button onclick="add('${i.name}',${i.price})">ADD</button>
</div>`;
});

/* MENU */
function toggleMenu(){
menu.classList.add("open");
overlay.style.display="block";
}
function closeMenu(){
menu.classList.remove("open");
overlay.style.display="none";
}

/* CLOSE MODALS */
window.onclick=e=>{
if(e.target.classList.contains("modal")){
e.target.style.display="none";
}
};

/* GOOGLE LOGIN */
function googleLogin(){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider).catch(err=>{
alert("Login error: "+err.message);
});
}

/* LOGOUT */
function logout(){
auth.signOut();
}

/* AUTH STATE */
auth.onAuthStateChanged(user=>{
currentUser=user;

if(user){
userName.innerText=user.displayName || user.email;
userEmail.innerText=user.email;

loginBtn.style.display="none";
logoutBtn.style.display="block";
}else{
userName.innerText="Guest";
userEmail.innerText="Not logged in";

loginBtn.style.display="block";
logoutBtn.style.display="none";
}
});

/* CART */
const cartBtn=document.getElementById("cartBtn");

function add(name,price){
cart.push({name,price});
cartBtn.style.display="block";
cartBtn.innerText=`${cart.length} items`;
}

/* FLOW */
function openCart(){
cartPopup.style.display="flex";
summary.innerHTML=cart.map(i=>i.name).join("<br>");
}
function nextStep(){
cartPopup.style.display="none";
checkout.style.display="flex";
}

/* ORDER */
function confirmOrder(){
if(!currentUser){
alert("Please login first");
return;
}

db.collection("orders").add({
userId:currentUser.uid,
items:cart,
address:document.getElementById("address").value,
payment:document.getElementById("payment").value,
createdAt:new Date()
});

alert("Order placed!");

cart=[];
cartBtn.style.display="none";
checkout.style.display="none";
}

/* ORDERS */
function openOrders(){
ordersPanel.style.display="flex";

db.collection("orders").onSnapshot(snap=>{
ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

if(currentUser && o.userId===currentUser.uid){
ordersList.innerHTML+=`
<div style="border:1px solid #ddd;padding:10px;margin:5px;border-radius:6px">
<b>Items:</b> ${o.items.length}<br>
<b>Address:</b> ${o.address}<br>
<b>Payment:</b> ${o.payment}
</div>`;
}
});
});
}

/* DOM */
const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");
const userName=document.getElementById("userName");
const userEmail=document.getElementById("userEmail");
const loginBtn=document.getElementById("loginBtn");
const logoutBtn=document.getElementById("logoutBtn");
const cartPopup=document.getElementById("cartPopup");
const checkout=document.getElementById("checkout");
const summary=document.getElementById("summary");
const ordersPanel=document.getElementById("ordersPanel");
const ordersList=document.getElementById("ordersList");

</script>

</body>
</html>
