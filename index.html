<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:sans-serif;background:#f6f6f6}

/* HEADER */
header{
background:#16a34a;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* MENU */
.card{
background:white;
margin:10px;
padding:12px;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
}

/* BUTTON */
button{
background:#16a34a;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
}

/* CART BAR */
#cartBar{
position:fixed;
bottom:10px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:25px;
display:none;
cursor:pointer;
}

/* MODAL */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:350px;
}

/* MAP */
#map{
width:100%;
height:300px;
border-radius:10px;
}
</style>
</head>

<body>

<header>
☰ Chicken Delivery
<span onclick="login()">👤</span>
</header>

<!-- MENU -->
<div id="menu"></div>

<!-- CART -->
<div id="cartBar" onclick="openCheckout()"></div>

<!-- CHECKOUT -->
<div id="checkout" class="modal">
<div class="box">
<h3>Checkout</h3>
<input id="address" placeholder="Address"><br><br>

<select id="payment">
<option>Cash on Delivery</option>
<option>Pay Online</option>
</select><br><br>

<button onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- TRACK -->
<div id="trackModal" class="modal">
<div class="box">
<h3>Live Tracking</h3>
<div id="map"></div>
</div>
</div>

<!-- ORDERS -->
<div id="orders"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
});

const db=firebase.firestore();
const auth=firebase.auth();

/* LOGIN */
function login(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}

/* CART */
let cart=[];

/* LOAD ITEMS */
db.collection("items").onSnapshot(snap=>{
menu.innerHTML="";
snap.forEach(doc=>{
let i=doc.data();

menu.innerHTML+=`
<div class="card">
<div class="row">
<div>
<b>${i.name}</b><br>₹${i.price}
</div>
<button onclick="addItem('${doc.id}','${i.name}',${i.price})">ADD</button>
</div>
</div>`;
});
});

/* ADD */
function addItem(id,name,price){
cart.push({id,name,price});
updateCart();
}

function updateCart(){
if(cart.length===0){
cartBar.style.display="none";
return;
}

let total=cart.reduce((a,b)=>a+b.price,0);
cartBar.style.display="block";
cartBar.innerHTML=`${cart.length} items • ₹${total}`;
}

/* CHECKOUT */
function openCheckout(){
checkout.style.display="flex";
}

function placeOrder(){
let user=auth.currentUser;
if(!user){alert("Login required");return;}

db.collection("orders").add({
userId:user.uid,
userName:user.displayName,
items:cart,
address:address.value,
payment:payment.value,
status:"pending",
createdAt:firebase.firestore.FieldValue.serverTimestamp()
});

cart=[];
updateCart();
checkout.style.display="none";
alert("Order placed!");
}

/* ORDERS */
auth.onAuthStateChanged(user=>{
if(!user) return;

db.collection("orders")
.where("userId","==",user.uid)
.orderBy("createdAt","desc")
.onSnapshot(snap=>{
orders.innerHTML="<h3 style='padding:10px'>Your Orders</h3>";

snap.forEach(doc=>{
let o=doc.data();

orders.innerHTML+=`
<div class="card">
<b>${doc.id.slice(0,6)}</b><br>
Status: ${o.status}<br>
<button onclick="track('${doc.id}')">Track</button>
</div>`;
});
});
});

/* TRACK MAP (FIXED REALTIME) */
let map, marker, watchId;

function track(id){
trackModal.style.display="flex";

/* INIT MAP */
map=new google.maps.Map(document.getElementById("map"),{
zoom:15,
center:{lat:0,lng:0}
});

marker=new google.maps.Marker({map});

/* LIVE TRACK */
if(navigator.geolocation){
watchId=navigator.geolocation.watchPosition(pos=>{
let loc={
lat:pos.coords.latitude,
lng:pos.coords.longitude
};

marker.setPosition(loc);
map.setCenter(loc);

});
}
}

/* CLOSE MODAL */
window.onclick=e=>{
if(e.target.classList.contains("modal")){
e.target.style.display="none";
if(watchId) navigator.geolocation.clearWatch(watchId);
}
};
</script>

<!-- GOOGLE MAP -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLds9mdWrFd1ap158yji-WzxRatQcYFQA"></script>

</body>
</html>
