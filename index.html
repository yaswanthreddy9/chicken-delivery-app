<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:system-ui;background:#fafafa}

/* HEADER */
header{
display:flex;align-items:center;
padding:12px;background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:sticky;top:0
}

.menu{font-size:22px;margin-right:10px;cursor:pointer}
.title{flex:1;text-align:center;font-weight:bold}
.login{background:#16a34a;color:white;padding:6px 14px;border-radius:20px}

/* SIDEBAR */
.sidebar{
position:fixed;left:-260px;top:0;width:260px;height:100%;
background:white;transition:.3s;z-index:20
}
.sidebar.active{left:0}
.sidebar h3{padding:20px;margin:0;background:#16a34a;color:white}
.sidebar div{padding:15px;border-bottom:1px solid #eee}

.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;z-index:10
}

/* PAGE */
.page{display:none}
.active{display:block}

/* ITEM */
.card{
display:flex;justify-content:space-between;
background:white;margin:10px;padding:12px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.left{width:60%}
.name{font-weight:bold}
.price{color:#16a34a}

.right{width:35%;position:relative;text-align:center}
.right img{
width:100%;height:110px;
object-fit:cover;border-radius:10px;
}

.add-btn{
position:absolute;bottom:-10px;left:50%;
transform:translateX(-50%);
background:white;border:1px solid #16a34a;
color:#16a34a;padding:4px 16px;border-radius:10px;
}

.qty{
position:absolute;bottom:-10px;left:50%;
transform:translateX(-50%);
display:flex;gap:10px;
background:#16a34a;color:white;
padding:4px 10px;border-radius:10px;
}

.qty button{background:none;border:none;color:white}

/* CART BAR */
.cart{
position:fixed;bottom:15px;left:50%;
transform:translateX(-50%);
background:#16a34a;color:white;
padding:12px 20px;border-radius:25px;
}

/* ORDER */
.order{
background:white;margin:10px;padding:10px;border-radius:10px
}

/* INPUT */
input,select{
width:100%;padding:10px;margin-bottom:10px;
border-radius:8px;border:1px solid #ccc
}

button.primary{
width:100%;padding:12px;
background:#16a34a;color:white;
border:none;border-radius:10px
}
</style>
</head>

<body>

<header>
<div class="menu" onclick="openMenu()">☰</div>
<div class="title">Chicken Delivery</div>
<div id="authBtn" class="login">Login</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
<h3 id="userName">Guest</h3>
<div onclick="go('home')">Home</div>
<div onclick="go('cartPage')">Cart</div>
<div onclick="go('orders')">Orders</div>
<div onclick="logout()">Logout</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div id="menu"></div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
<h3 style="padding:10px">Cart</h3>

<div id="cartItems"></div>

<div style="padding:10px">
<b>Total: ₹<span id="totalAmount">0</span></b>

<input id="address" placeholder="Enter address">

<button onclick="getLocation()">📍 Use My Location</button>

<select id="payment">
<option value="COD">Cash on Delivery</option>
<option value="ONLINE">Pay Online</option>
</select>

<button class="primary" onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
<h3 style="padding:10px">Orders</h3>
<div id="orderList"></div>
</div>

<div id="cartBar" class="cart">0 items</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, collection, addDoc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig={
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
};

const app=initializeApp(firebaseConfig);
const auth=getAuth(app);
const db=getFirestore(app);
const provider=new GoogleAuthProvider();

/* MENU */
window.openMenu=()=>{sidebar.classList.add("active");overlay.style.display="block";}
window.closeMenu=()=>{sidebar.classList.remove("active");overlay.style.display="none";}

/* NAV */
window.go=(p)=>{
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
closeMenu();
};

/* LOGIN */
authBtn.onclick=()=>auth.currentUser?signOut(auth):signInWithPopup(auth,provider);
window.logout=()=>signOut(auth);

onAuthStateChanged(auth,user=>{
if(user){
authBtn.innerText="Logout";
userName.innerText=user.displayName;
loadOrders(user.uid);
}else{
authBtn.innerText="Login";
}
});

/* CART */
let cart={};

window.add=(id,name,price)=>{
if(!cart[id])cart[id]={name,price,qty:0};
cart[id].qty++;
render();
};

window.inc=(id)=>{cart[id].qty++;render();}
window.dec=(id)=>{cart[id].qty--;if(cart[id].qty<=0) delete cart[id];render();}

function render(){
let total=0,count=0;

document.querySelectorAll(".card").forEach(el=>{
let id=el.dataset.id;
let c=cart[id];
let box=el.querySelector(".action");

if(c){
box.innerHTML=`<div class="qty">
<button onclick="dec('${id}')">-</button>${c.qty}
<button onclick="inc('${id}')">+</button>
</div>`;
}else{
box.innerHTML=`<button class="add-btn"
onclick="add('${id}','${el.dataset.name}',${el.dataset.price})">ADD</button>`;
}
});

cartItems.innerHTML="";

for(let k in cart){
let i=cart[k];
total+=i.price*i.qty;
count+=i.qty;

cartItems.innerHTML+=`
<div class="order">
${i.name} x ${i.qty} = ₹${i.price*i.qty}
</div>`;
}

cartBar.innerText=`${count} items • ₹${total}`;
totalAmount.innerText=total;
}

/* ITEMS */
onSnapshot(collection(db,"items"),snap=>{
menu.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

menu.innerHTML+=`
<div class="card" data-id="${doc.id}" data-name="${d.name}" data-price="${d.price}">
<div class="left">
<div class="name">${d.name}</div>
<div class="price">₹${d.price}</div>
</div>
<div class="right">
<img src="${d.image}">
<div class="action"></div>
</div>
</div>`;
});
render();
});

/* CART CLICK */
cartBar.onclick=()=>go("cartPage");

/* LOCATION */
window.getLocation=()=>{
navigator.geolocation.getCurrentPosition(pos=>{
address.value=`Lat:${pos.coords.latitude},Lng:${pos.coords.longitude}`;
});
};

/* PLACE ORDER */
window.placeOrder=async ()=>{
let user=auth.currentUser;
if(!user){alert("Login first");return;}
if(!address.value){alert("Enter address");return;}

await addDoc(collection(db,"orders"),{
userId:user.uid,
items:Object.values(cart),
address:address.value,
payment:payment.value,
status:"pending",
createdAt:Date.now()
});

cart={};
render();
alert("Order placed!");
go("orders");
};

/* ORDERS */
function loadOrders(uid){
const q=query(collection(db,"orders"),where("userId","==",uid));

onSnapshot(q,snap=>{
let arr=[];
snap.forEach(doc=>arr.push(doc.data()));

arr.sort((a,b)=>b.createdAt-a.createdAt);

orderList.innerHTML="";
arr.forEach(o=>{
orderList.innerHTML+=`
<div class="order">
${o.status}<br>${o.address}
</div>`;
});
});
}
</script>

</body>
</html>
