<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:system-ui;background:#f6f6f6}

/* HEADER */
header{
background:#16a34a;color:#fff;
padding:14px;display:flex;
justify-content:space-between;align-items:center;
position:sticky;top:0;z-index:10
}
.menu{font-size:22px;cursor:pointer}
.login{background:#fff;color:#16a34a;padding:6px 12px;border-radius:20px}

/* SIDEBAR */
.sidebar{
position:fixed;left:-260px;top:0;width:260px;height:100%;
background:#fff;transition:.3s;z-index:20;
box-shadow:2px 0 10px rgba(0,0,0,0.2)
}
.sidebar.active{left:0}
.sidebar h3{margin:0;padding:20px;background:#16a34a;color:#fff}
.sidebar a{display:block;padding:14px;border-bottom:1px solid #eee}
.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;z-index:15
}

/* FOOD CARD */
.card{
background:#fff;border-radius:12px;margin:10px;
display:flex;justify-content:space-between;padding:10px
}
.card img{width:110px;height:110px;border-radius:10px;object-fit:cover}
.add{background:#16a34a;color:#fff;border:none;padding:6px 12px;border-radius:6px}

/* CART BAR */
.cart{
position:fixed;bottom:10px;left:10px;right:10px;
background:#16a34a;color:#fff;padding:12px;
border-radius:30px;text-align:center;font-weight:bold
}

/* PAGE */
.page{display:none}
.active{display:block}

/* ORDERS */
.order{
background:#fff;margin:10px;padding:12px;border-radius:10px
}

/* STATUS */
.status{
padding:5px 10px;border-radius:20px;font-size:12px
}
.pending{background:#fde68a}
.preparing{background:#bfdbfe}
.delivery{background:#a7f3d0}
.delivered{background:#bbf7d0}

/* MAP */
#map{height:300px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<div class="menu" onclick="openMenu()">☰</div>
<div>Chicken Delivery</div>
<div class="login" id="authBtn">Login</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
<h3 id="userName">Guest</h3>
<a onclick="go('home')">Home</a>
<a onclick="go('orders')">Orders</a>
<a onclick="logout()">Logout</a>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div id="menu"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
<h3 style="padding:10px">Your Orders</h3>
<div id="orderList"></div>
</div>

<!-- TRACK -->
<div id="trackPage" class="page">
<h3 style="padding:10px">Live Tracking</h3>
<div id="map"></div>
</div>

<div class="cart" id="cartBar" onclick="placeOrder()">Cart</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<!-- Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=YOUR_MAP_KEY"></script>

<script>
const firebaseConfig={
apiKey:"YOUR_KEY",
authDomain:"YOUR_DOMAIN",
projectId:"YOUR_ID"
};
firebase.initializeApp(firebaseConfig);

const db=firebase.firestore();
const auth=firebase.auth();

/* MENU UI */
function openMenu(){sidebar.classList.add("active");overlay.style.display="block";}
function closeMenu(){sidebar.classList.remove("active");overlay.style.display="none";}
function go(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
closeMenu();
}

/* LOGIN */
authBtn.onclick=()=>{
if(auth.currentUser){auth.signOut();}
else{
let p=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(p);
}
};

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
if(user){
authBtn.innerText="Logout";
userName.innerText=user.displayName;
loadOrders(user.uid);
}else{
authBtn.innerText="Login";
userName.innerText="Guest";
}
});

/* MENU */
db.collection("items").onSnapshot(snap=>{
menu.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
menu.innerHTML+=`
<div class="card">
<div>
<b>${d.name}</b><br>₹${d.price}
</div>
<img src="${d.img}">
<button class="add" onclick="add('${doc.id}','${d.name}',${d.price})">ADD</button>
</div>`;
});
});

/* CART */
let cart={};

function add(id,name,price){
if(!cart[id])cart[id]={name,price,qty:0};
cart[id].qty++;
renderCart();
}

function renderCart(){
let total=0,count=0;
Object.values(cart).forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;
});
cartBar.innerText=count+" items • ₹"+total;
}

/* PLACE ORDER */
function placeOrder(){
let user=auth.currentUser;
if(!user){alert("Login first");return;}

db.collection("orders").add({
userId:user.uid,
items:Object.values(cart),
status:"pending",
createdAt:Date.now()
});

cart={};
renderCart();
go("orders");
}

/* STATUS COLOR */
function getStatusClass(s){
if(s==="pending")return "pending";
if(s==="preparing")return "preparing";
if(s==="out for delivery")return "delivery";
if(s==="delivered")return "delivered";
}

/* LOAD ORDERS */
function loadOrders(uid){
db.collection("orders")
.where("userId","==",uid)
.onSnapshot(snap=>{

let arr=[];
snap.forEach(doc=>{
arr.push({id:doc.id,...doc.data()});
});

arr.sort((a,b)=>b.createdAt-a.createdAt);

orderList.innerHTML="";

arr.forEach(o=>{

let trackBtn="";
if(o.status==="out for delivery" && o.deliveryLocation){
trackBtn=`<button onclick="track('${o.id}')">Track</button>`;
}

orderList.innerHTML+=`
<div class="order">
<b>Order:</b> ${o.id.slice(0,6)}<br>
<span class="status ${getStatusClass(o.status)}">${o.status}</span><br>
${trackBtn}
</div>`;
});
});
}

/* MAP */
let map,marker;

function track(id){
go("trackPage");

if(!map){
map=new google.maps.Map(document.getElementById("map"),{
zoom:15,
center:{lat:17.38,lng:78.48}
});
marker=new google.maps.Marker({map});
}

db.collection("orders").doc(id)
.onSnapshot(doc=>{
let d=doc.data();
if(d.deliveryLocation){
marker.setPosition(d.deliveryLocation);
map.setCenter(d.deliveryLocation);
}
});
}
</script>

</body>
</html>
