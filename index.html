<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Chicken Delivery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

header{
background:#16a34a;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:10px;
}

/* SIDEBAR */
.menu{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
transition:0.3s;
z-index:1000;
}
.menu.open{left:0}

.menu-header{
background:#16a34a;
color:white;
padding:20px;
}

.menu-item{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* OVERLAY */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
}

/* CONTENT */
.container{padding:15px}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:10px;
}

.card{
background:white;
padding:10px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

/* BUTTON */
button{
padding:8px;
border:none;
border-radius:6px;
background:#16a34a;
color:white;
margin-top:5px;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:10px 20px;
border-radius:30px;
display:none;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

input,select{
width:100%;
padding:10px;
margin:6px 0;
border-radius:6px;
border:1px solid #ccc;
}
</style>
</head>

<body>

<header>
<span onclick="openMenu()">☰</span>
Chicken Delivery
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div id="menu" class="menu">
<div class="menu-header">
<h3 id="userName">Guest</h3>
<p id="userEmail">Not logged in</p>
</div>

<div id="loginBtn" class="menu-item" onclick="login()">🔐 Login with Google</div>
<div class="menu-item" onclick="openOrders()">📦 My Orders</div>
<div id="logoutBtn" class="menu-item" onclick="logout()" style="display:none">🚪 Logout</div>
</div>

<div class="container">
<h3>Menu</h3>
<div id="itemsList" class="grid"></div>
</div>

<div id="cartBtn" class="cart" onclick="openCart()"></div>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="checkout()">Next</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal">
<div class="box">
<input id="address" placeholder="Enter Address">
<select id="payment">
<option value="cod">Cash on Delivery</option>
<option value="online">Pay Online</option>
</select>
<button onclick="placeOrder()">Confirm Order</button>
</div>
</div>

<!-- ORDERS -->
<div id="ordersModal" class="modal">
<div class="box">
<h3>Your Orders</h3>
<div id="ordersList"></div>
</div>
</div>

<!-- TRACKING -->
<div id="mapModal" class="modal">
<div class="box">
<h3>Live Tracking</h3>
<div id="map" style="height:300px;"></div>
</div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<!-- Google Maps -->
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLds9mdWrFd1ap158yji-WzxRatQcYFQA"></script>

<script>
const config={
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
};

firebase.initializeApp(config);
const db=firebase.firestore();
const auth=firebase.auth();

let cart=[];
let user=null;
let map=null;
let marker=null;

/* MENU */
function openMenu(){menu.classList.add("open");overlay.style.display="block";}
function closeMenu(){menu.classList.remove("open");overlay.style.display="none";}

/* AUTH */
function login(){
const provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}
function logout(){auth.signOut();}

auth.onAuthStateChanged(u=>{
user=u;
if(u){
userName.innerText=u.displayName;
userEmail.innerText=u.email;
loginBtn.style.display="none";
logoutBtn.style.display="block";
}else{
userName.innerText="Guest";
userEmail.innerText="Not logged in";
loginBtn.style.display="block";
logoutBtn.style.display="none";
}
});

/* LOAD ITEMS (SYNC FROM ADMIN) */
db.collection("items").onSnapshot(snap=>{
itemsList.innerHTML="";
snap.forEach(doc=>{
let i=doc.data();

itemsList.innerHTML+=`
<div class="card">
<b>${i.name}</b><br>₹${i.price}
<button onclick="add('${i.name}',${i.price})">ADD</button>
</div>`;
});
});

/* CART */
function add(name,price){
cart.push({name,price});
cartBtn.style.display="block";
cartBtn.innerText=`${cart.length} items`;
}

function openCart(){
cartModal.style.display="flex";
cartItems.innerHTML=cart.map(i=>i.name).join("<br>");
}

function checkout(){
cartModal.style.display="none";
checkoutModal.style.display="flex";
}

/* PLACE ORDER */
function placeOrder(){
if(!user){alert("Login first");return;}

db.collection("orders").add({
userId:user.uid,
userName:user.displayName,
items:cart,
address:address.value,
payment:payment.value,
status:"pending",
createdAt:firebase.firestore.FieldValue.serverTimestamp()
});

alert("Order placed!");

cart=[];
cartBtn.style.display="none";
checkoutModal.style.display="none";
}

/* LOAD USER ORDERS (FILTERED) */
function openOrders(){
ordersModal.style.display="flex";

if(!user){
ordersList.innerHTML="Login to view orders";
return;
}

db.collection("orders")
.where("userId","==",user.uid)
.onSnapshot(snap=>{

ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

ordersList.innerHTML+=`
<div style="border:1px solid #ddd;padding:10px;margin:5px;border-radius:6px">
<b>Order:</b> ${doc.id.slice(0,6)}<br>
<b>Status:</b> ${o.status || "pending"}<br>

${o.status==="out for delivery"
? `<button onclick="trackOrder('${doc.id}')">Track Order</button>`
: ""}

</div>`;
});
});
}

/* TRACK ORDER LIVE */
function trackOrder(orderId){
mapModal.style.display="flex";

db.collection("orders").doc(orderId)
.onSnapshot(doc=>{
let d=doc.data();
if(!d.location) return;

let lat=d.location.lat;
let lng=d.location.lng;

if(!map){
map=new google.maps.Map(document.getElementById("map"),{
center:{lat,lng},
zoom:15
});
marker=new google.maps.Marker({
position:{lat,lng},
map:map
});
}else{
marker.setPosition({lat,lng});
map.setCenter({lat,lng});
}
});
}

/* CLOSE MODALS */
window.onclick=e=>{
if(e.target.classList.contains("modal")){
e.target.style.display="none";
}
};

/* DOM */
const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");
const userName=document.getElementById("userName");
const userEmail=document.getElementById("userEmail");
const loginBtn=document.getElementById("loginBtn");
const logoutBtn=document.getElementById("logoutBtn");
const cartBtn=document.getElementById("cartBtn");
const cartModal=document.getElementById("cartModal");
const checkoutModal=document.getElementById("checkoutModal");
const ordersModal=document.getElementById("ordersModal");
const mapModal=document.getElementById("mapModal");
const cartItems=document.getElementById("cartItems");
const ordersList=document.getElementById("ordersList");
const address=document.getElementById("address");
const payment=document.getElementById("payment");
</script>

</body>
</html>
