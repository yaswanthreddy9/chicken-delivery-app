<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:system-ui;background:#fafafa}

/* HEADER */
header{
display:flex;align-items:center;
padding:12px;background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:sticky;top:0;
}

.menu{font-size:22px;margin-right:10px;cursor:pointer}
.title{flex:1;text-align:center;font-weight:bold}
.login{background:#16a34a;color:white;padding:6px 14px;border-radius:20px}

/* ITEM CARD */
.card{
display:flex;
justify-content:space-between;
background:white;
margin:10px;
padding:12px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.left{width:60%}
.name{font-weight:bold}
.price{color:#16a34a;font-weight:bold}
.desc{font-size:12px;color:#666}

.right{width:35%;position:relative;text-align:center}
.right img{
width:100%;
height:110px;
object-fit:cover;
border-radius:10px;
}

.add-btn{
position:absolute;
bottom:-10px;
left:50%;
transform:translateX(-50%);
background:white;
border:1px solid #16a34a;
color:#16a34a;
padding:4px 16px;
border-radius:10px;
font-weight:bold;
}

.qty{
position:absolute;
bottom:-10px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:10px;
background:#16a34a;
color:white;
padding:4px 10px;
border-radius:10px;
}

.qty button{
background:none;border:none;color:white;
}

/* CART */
.cart{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:25px;
}

/* PAGE */
.page{display:none}
.active{display:block}

/* ORDERS */
.order{
background:white;
margin:10px;
padding:10px;
border-radius:10px;
}

.track{background:black;color:white;padding:5px 10px;border-radius:6px;margin-top:5px}

#map{height:300px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<div class="menu">☰</div>
<div class="title">Chicken Delivery</div>
<div id="authBtn" class="login">Login</div>
</header>

<div id="home" class="page active">
<div id="menu"></div>
</div>

<div id="orders" class="page">
<h3 style="padding:10px">Your Orders</h3>
<div id="orderList"></div>
</div>

<div id="trackPage" class="page">
<div id="map"></div>
</div>

<div id="cartBar" class="cart">0 items</div>

<!-- MODULAR FIREBASE -->
<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import { getFirestore, collection, addDoc, onSnapshot, query, where, doc } 
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

/* YOUR CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
  authDomain: "chicken-delivery-app-9e4f6.firebaseapp.com",
  projectId: "chicken-delivery-app-9e4f6",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const provider = new GoogleAuthProvider();

/* LOGIN */
authBtn.onclick=()=>{
if(auth.currentUser){
signOut(auth);
}else{
signInWithPopup(auth,provider);
}
};

onAuthStateChanged(auth,user=>{
if(user){
authBtn.innerText="Logout";
loadOrders(user.uid);
}else{
authBtn.innerText="Login";
orderList.innerHTML="";
}
});

/* CART */
let cart={};

function add(id,name,price){
if(!cart[id]) cart[id]={name,price,qty:0};
cart[id].qty++;
render();
}

function render(){
document.querySelectorAll(".card").forEach(el=>{
let id=el.dataset.id;
let c=cart[id];
let box=el.querySelector(".action");

if(c){
box.innerHTML=`
<div class="qty">
<button onclick="dec('${id}')">-</button>${c.qty}
<button onclick="inc('${id}')">+</button>
</div>`;
}else{
box.innerHTML=`<button class="add-btn"
onclick="add('${id}','${el.dataset.name}',${el.dataset.price})">ADD</button>`;
}
});

let total=0,count=0;
for(let k in cart){
total+=cart[k].price*cart[k].qty;
count+=cart[k].qty;
}

cartBar.innerText=`${count} items • ₹${total}`;
}

window.add=(id,name,price)=>add(id,name,price);
window.inc=(id)=>{cart[id].qty++;render();}
window.dec=(id)=>{cart[id].qty--;if(cart[id].qty<=0) delete cart[id];render();}

/* LOAD ITEMS */
onSnapshot(collection(db,"items"),snap=>{
menu.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();

menu.innerHTML+=`
<div class="card" data-id="${doc.id}" data-name="${d.name}" data-price="${d.price}">
<div class="left">
<div class="name">${d.name}</div>
<div class="price">₹${d.price}</div>
<div class="desc">${d.desc||""}</div>
</div>

<div class="right">
<img src="${d.image||'https://via.placeholder.com/150'}">
<div class="action"></div>
</div>
</div>`;
});
render();
});

/* PLACE ORDER */
cartBar.onclick=async ()=>{
let user=auth.currentUser;
if(!user){alert("Login first");return;}

await addDoc(collection(db,"orders"),{
userId:user.uid,
items:Object.values(cart),
status:"pending",
createdAt:Date.now(),
deliveryLocation:null
});

cart={};
render();
};

/* LOAD ORDERS */
function loadOrders(uid){
const q=query(collection(db,"orders"),where("userId","==",uid));

onSnapshot(q,snap=>{
let arr=[];
snap.forEach(doc=>{
arr.push({id:doc.id,...doc.data()});
});

arr.sort((a,b)=>b.createdAt-a.createdAt);

orderList.innerHTML="";

arr.forEach(o=>{
let btn="";
if(o.status==="out for delivery" && o.deliveryLocation){
btn=`<button class="track" onclick="track('${o.id}')">Track</button>`;
}

orderList.innerHTML+=`
<div class="order">
<b>${o.id.slice(0,6)}</b><br>
${o.status}<br>
${btn}
</div>`;
});
});
}

</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLds9mdWrFd1ap158yji-WzxRatQcYFQA"></script>

</body>
</html>
