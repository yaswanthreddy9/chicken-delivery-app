<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#16a34a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

/* MENU */
.menu{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
transition:.3s;
z-index:1000;
}
.menu.open{left:0}

.menu-header{
background:#16a34a;
color:white;
padding:20px;
}

.menu-item{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* OVERLAY */
#overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
z-index:900;
}

/* ITEMS */
.container{padding:15px}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* QTY */
.qty{
display:flex;
gap:10px;
margin-top:10px;
align-items:center;
}
.qty button{
background:#16a34a;
color:white;
border:none;
padding:6px 10px;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:flex-end; /* slide from bottom (mobile feel) */
z-index:9999;
}

.box{
background:white;
width:100%;
height:80%; /* takes bottom 80% */
border-radius:20px 20px 0 0;
padding:15px;
overflow-y:auto; /* SCROLL FIX */
animation:slideUp .3s ease;
}

/* ANIMATION */
@keyframes slideUp{
from{transform:translateY(100%)}
to{transform:translateY(0)}
}

/* ORDER */
.order{
background:#fff;
padding:12px;
margin:8px 0;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
<span onclick="openMenu()">☰</span>
Chicken Delivery
<button id="loginBtn">Login</button>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<div id="menu" class="menu">
<div class="menu-header">
<h3 id="userName">Guest</h3>
<p id="userEmail">Not logged</p>
</div>

<div class="menu-item" onclick="openOrders()">Orders</div>
<div class="menu-item" onclick="logout()">Logout</div>
</div>

<div class="container">
<h3>Menu</h3>
<div id="itemsList"></div>
</div>

<div id="cartBtn" class="cart" style="display:none"></div>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<b>Total ₹<span id="total"></span></b><br><br>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal">
<div class="box">
<h3>Checkout</h3>
<input id="address" placeholder="Address" style="width:100%;padding:10px"><br><br>

<select id="payment" style="width:100%;padding:10px">
<option value="">Payment</option>
<option value="COD">Cash on Delivery</option>
<option value="ONLINE">Online</option>
</select><br><br>

<button onclick="placeOrder()">Confirm</button>
</div>
</div>

<!-- ORDERS -->
<div id="ordersModal" class="modal">
<div class="box">
<div style="text-align:center;font-weight:bold;margin-bottom:10px">
Your Orders
</div>

<!-- MAP TRACKING -->
<div id="mapModal" class="modal">
<div class="box" style="height:90%">
<h3>Live Tracking</h3>
<div id="map" style="height:85%;width:100%"></div>
</div>
</div>  

<div id="ordersList"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
});

const db=firebase.firestore();
const auth=firebase.auth();

let cart={};
let itemsCache={};
let user=null;

/* MENU FIX */
function openMenu(){
menu.classList.add("open");
overlay.style.display="block";
}
function closeMenu(){
menu.classList.remove("open");
overlay.style.display="none";
}

/* LOGIN */
loginBtn.onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
function logout(){auth.signOut();}

auth.onAuthStateChanged(u=>{
user=u;
loginBtn.innerText=u?"Logout":"Login";
if(u){
loginBtn.onclick=logout;
userName.innerText=u.displayName;
userEmail.innerText=u.email;
}else{
loginBtn.onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
});

/* LOAD ITEMS (FIXED) */
db.collection("items").onSnapshot(snap=>{
itemsList.innerHTML="";
itemsCache={};

snap.forEach(doc=>{
let i=doc.data();
itemsCache[doc.id]=i;

itemsList.innerHTML+=`
<div class="card">
<img src="${i.image}">
<b>${i.name}</b><br>
₹${i.price}
<div id="ctrl-${doc.id}"></div>
</div>`;
});

setTimeout(render,100);
});

/* CART */
function add(id){
if(!cart[id]) cart[id]={...itemsCache[id],qty:0};
cart[id].qty++;
render();
}
function inc(id){cart[id].qty++;render();}
function dec(id){
cart[id].qty--;
if(cart[id].qty<=0) delete cart[id];
render();
}

/* RENDER FIX */
function render(){
let total=0,count=0;

Object.keys(itemsCache).forEach(id=>{
let el=document.getElementById("ctrl-"+id);
let item=itemsCache[id];
let c=cart[id];

if(c){
el.innerHTML=`
<div class="qty">
<button onclick="dec('${id}')">-</button>
${c.qty}
<button onclick="inc('${id}')">+</button>
</div>`;
}else{
el.innerHTML=`<button onclick="add('${id}')">ADD</button>`;
}
});

for(let id in cart){
total+=cart[id].price*cart[id].qty;
count+=cart[id].qty;
}

cartBtn.style.display=count?"block":"none";
cartBtn.innerText=`${count} items • ₹${total}`;
updateCart();
}

/* CART UI */
function updateCart(){
cartItems.innerHTML="";
let total=0;

for(let id in cart){
let c=cart[id];
let sub=c.price*c.qty;
total+=sub;

cartItems.innerHTML+=`
<div>
${c.name} x${c.qty} = ₹${sub}
</div>`;
}

document.getElementById("total").innerText=total;
}

/* MODALS */
cartBtn.onclick=()=>cartModal.style.display="flex";
function checkout(){
cartModal.style.display="none";
checkoutModal.style.display="flex";
}

/* PLACE ORDER */
function placeOrder(){
if(!user){alert("Login first");return;}
if(!address.value){alert("Enter address");return;}
if(!payment.value){alert("Select payment");return;}

let items=[];
let total=0;

for(let id in cart){
items.push(cart[id]);
total+=cart[id].price*cart[id].qty;
}

db.collection("orders").add({
userId:user.uid,
items,
total,
address:address.value,
payment:payment.value,
status:"pending",
createdAt:firebase.firestore.FieldValue.serverTimestamp()
});

alert("Order placed!");
cart={};
checkoutModal.style.display="none";
render();
}

/* ORDERS */
function openOrders(){
ordersModal.style.display="flex";

if(!user){
ordersList.innerHTML="Login first";
return;
}

db.collection("orders")
.where("userId","==",user.uid)
.onSnapshot(snap=>{

let data=[];

snap.forEach(doc=>{
data.push({id:doc.id, ...doc.data()});
});

/* LATEST FIRST */
data.sort((a,b)=>{
return (b.createdAt?.seconds||0) - (a.createdAt?.seconds||0);
});

ordersList.innerHTML="";

/* RENDER */
data.forEach(o=>{

let items=o.items||[];
let address=o.address||"No address";
let total=o.total||0;
let status=o.status||"pending";

let itemsText = items.length
? items.map(i=>`${i.name} x${i.qty||1}`).join(", ")
: "No items";

/* COLOR */
let color="#f59e0b";
if(status==="delivered") color="#16a34a";
if(status==="rejected") color="#dc2626";
if(status==="out for delivery") color="#2563eb";
let trackBtn = "";

if(status === "out for delivery"){
trackBtn = `
<button onclick="trackOrder('${o.id}')" 
style="
margin-top:10px;
padding:6px 12px;
background:#2563eb;
color:white;
border:none;
border-radius:6px;
">
Track
</button>`;
}
ordersList.innerHTML+=`
<div style="
background:#fff;
padding:14px;
margin:10px 0;
border-radius:12px;
box-shadow:0 3px 8px rgba(0,0,0,0.08);
">

<div style="display:flex;justify-content:space-between;">
<b>#${o.id.slice(0,6)}</b>
<span style="color:${color};font-weight:bold">${status}</span>
</div>

<div style="margin-top:6px">${itemsText}</div>
<div style="margin-top:6px;color:#555">📍 ${address}</div>
<div style="margin-top:6px;font-weight:bold">₹${total}</div>
${trackBtn} 
</div>`;
});

});
}

window.onclick=e=>{
if(e.target.classList.contains("modal")){
e.target.style.display="none";
}
};

const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");
let map, marker, unsubscribe;

function trackOrder(orderId){

mapModal.style.display="flex";

/* INIT MAP */
map = new google.maps.Map(document.getElementById("map"), {
center:{lat:17.385, lng:78.4867},
zoom:15
});

marker = new google.maps.Marker({
map:map
});

/* REMOVE OLD LISTENER */
if(unsubscribe) unsubscribe();

/* LIVE FIRESTORE TRACK */
unsubscribe = db.collection("orders")
.doc(orderId)
.onSnapshot(doc=>{

let data = doc.data();

/* ONLY TRACK WHEN LOCATION EXISTS */
if(!data || !data.location) return;

let loc = data.location;

let pos = {
lat:loc.lat,
lng:loc.lng
};

marker.setPosition(pos);
map.setCenter(pos);

});
}
  
</script>
<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLds9mdWrFd1ap158yji-WzxRatQcYFQA"></script>
</body>
</html>
