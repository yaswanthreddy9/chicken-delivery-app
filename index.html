<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#16a34a;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

/* MENU */
.menu{
position:fixed;
left:-260px;
top:0;
width:260px;
height:100%;
background:white;
transition:.3s;
z-index:1000;
}
.menu.open{left:0}

.menu-header{
background:#16a34a;
color:white;
padding:20px;
}

/* ITEMS */
.container{padding:15px}

.card{
background:white;
padding:12px;
margin:10px 0;
border-radius:12px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* QTY */
.qty{
display:flex;
gap:10px;
margin-top:10px;
}
.qty button{
background:#16a34a;color:white;border:none;padding:6px 10px;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.box{
background:white;
padding:20px;
border-radius:10px;
width:90%;
max-width:400px;
}

/* ORDER */
.order{
background:#fff;
padding:12px;
margin:8px 0;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<header>
<span onclick="openMenu()">☰</span>
Chicken Delivery
<button id="loginBtn">Login</button>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div id="menu" class="menu">
<div class="menu-header">
<h3 id="userName">Guest</h3>
<p id="userEmail">Not logged in</p>
</div>

<div class="menu-item" onclick="openOrders()">Orders</div>
<div class="menu-item" onclick="logout()">Logout</div>
</div>

<div class="container">
<h3>Menu</h3>
<div id="itemsList"></div>
</div>

<div id="cartBtn" class="cart" style="display:none"></div>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<b>Total ₹<span id="total"></span></b><br><br>
<button onclick="checkout()">Checkout</button>
</div>
</div>

<!-- CHECKOUT -->
<div id="checkoutModal" class="modal">
<div class="box">
<h3>Checkout</h3>

<input id="address" placeholder="Enter Address" style="width:100%;padding:10px"><br><br>

<select id="payment" style="width:100%;padding:10px">
<option value="">Select Payment</option>
<option value="COD">Cash on Delivery</option>
<option value="ONLINE">Online Payment</option>
</select><br><br>

<button onclick="placeOrder()">Confirm Order</button>
</div>
</div>

<!-- ORDERS -->
<div id="ordersModal" class="modal">
<div class="box">
<h3>Your Orders</h3>
<div id="ordersList"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
});

const db=firebase.firestore();
const auth=firebase.auth();

let cart={};
let user=null;

/* LOGIN */
loginBtn.onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
function logout(){auth.signOut();}

auth.onAuthStateChanged(u=>{
user=u;
loginBtn.innerText=u?"Logout":"Login";
if(u){
loginBtn.onclick=logout;
userName.innerText=u.displayName;
userEmail.innerText=u.email;
}else{
loginBtn.onclick=()=>auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
}
});

/* ITEMS */
db.collection("items").onSnapshot(snap=>{
itemsList.innerHTML="";

snap.forEach(doc=>{
let i=doc.data();

itemsList.innerHTML+=`
<div class="card">
<img src="${i.image}">
<b>${i.name}</b><br>
₹${i.price}
<div id="ctrl-${doc.id}"></div>
</div>`;
});

render();
});

/* CART */
function add(id,name,price){
if(!cart[id]) cart[id]={name,price,qty:0};
cart[id].qty++;
render();
}
function inc(id){cart[id].qty++;render();}
function dec(id){
cart[id].qty--;
if(cart[id].qty<=0) delete cart[id];
render();
}

/* RENDER */
function render(){
let total=0,count=0;

for(let id in cart){
let c=cart[id];
total+=c.price*c.qty;
count+=c.qty;

let el=document.getElementById("ctrl-"+id);
if(el){
el.innerHTML=`
<div class="qty">
<button onclick="dec('${id}')">-</button>
${c.qty}
<button onclick="inc('${id}')">+</button>
</div>`;
}
}

document.querySelectorAll("[id^='ctrl-']").forEach(el=>{
let id=el.id.replace("ctrl-","");
if(!cart[id]){
let name=el.parentElement.querySelector("b").innerText;
let price=el.parentElement.innerHTML.match(/₹(\\d+)/)[1];

el.innerHTML=`<button onclick="add('${id}','${name}',${price})">ADD</button>`;
}
});

cartBtn.style.display=count?"block":"none";
cartBtn.innerText=`${count} items • ₹${total}`;
}

/* CART MODAL */
cartBtn.onclick=()=>cartModal.style.display="flex";

function checkout(){
cartModal.style.display="none";
checkoutModal.style.display="flex";
}

/* PLACE ORDER */
function placeOrder(){
if(!user){alert("Login first");return;}
if(!address.value){alert("Enter address");return;}
if(!payment.value){alert("Select payment");return;}

let items=[];
let total=0;

for(let id in cart){
items.push(cart[id]);
total+=cart[id].price*cart[id].qty;
}

db.collection("orders").add({
userId:user.uid,
userName:user.displayName,
items:items,
total:total,
address:address.value,
payment:payment.value,
status:"pending",
createdAt:firebase.firestore.FieldValue.serverTimestamp()
});

alert("Order placed!");

cart={};
checkoutModal.style.display="none";
render();
}

/* ORDERS */
function openOrders(){
ordersModal.style.display="flex";

db.collection("orders")
.where("userId","==",user.uid)
.onSnapshot(snap=>{

ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();
if(!o.items || !o.total) return;

ordersList.innerHTML+=`
<div class="order">
<b>#${doc.id.slice(0,6)}</b><br>
${o.items.map(i=>i.name+" x"+i.qty).join(", ")}<br>
📍 ${o.address}<br>
₹${o.total}<br>
<b>${o.status}</b>
</div>`;
});
});
}

/* CLOSE MODAL */
window.onclick=e=>{
if(e.target.classList.contains("modal")){
e.target.style.display="none";
}
};

const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");
</script>

</body>
</html>
