<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
display:flex;align-items:center;
padding:12px;background:white;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
position:sticky;top:0;z-index:100;
}

.menu{font-size:22px;cursor:pointer}
.title{flex:1;text-align:center;font-weight:bold}
.login-btn{
background:#16a34a;color:white;
border:none;padding:6px 14px;
border-radius:20px;
}

/* SIDEBAR */
.sidebar{
position:fixed;left:-260px;top:0;
width:260px;height:100%;
background:white;transition:0.3s;
z-index:200;
}
.sidebar.open{left:0}
.menu-item{padding:15px;border-bottom:1px solid #eee;cursor:pointer}

.overlay{
position:fixed;width:100%;height:100%;
background:rgba(0,0,0,0.4);
display:none;z-index:150;
}

/* ITEM CARD */
.item{
display:flex;
background:white;
margin:10px;
padding:10px;
border-radius:14px;
box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.left{width:65%}
.right{width:35%;text-align:center}

.right img{
width:100%;height:110px;
border-radius:10px;
object-fit:cover;
}

.add{
border:1px solid #ff4d4d;
color:#ff4d4d;
background:white;
padding:5px 12px;
border-radius:10px;
margin-top:-20px;
}

.qty{
display:flex;
justify-content:center;
gap:10px;
margin-top:-20px;
}
.qty button{
background:#16a34a;color:white;
border:none;border-radius:5px;
}

/* CART BAR */
.cartbar{
position:fixed;
bottom:15px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:25px;
display:none;
}

/* PAGES */
.page{display:none}
.active{display:block;padding:10px}

/* CARD */
.card{
background:white;
padding:10px;
margin:10px;
border-radius:10px;
}

/* MAP */
#map{height:300px;border-radius:10px;margin-top:10px}
</style>
</head>

<body>

<header>
<span class="menu" onclick="openMenu()">☰</span>
<div class="title">Chicken Delivery</div>
<button id="authBtn" class="login-btn" onclick="handleAuth()">Login</button>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
<div id="userName" class="menu-item">Guest</div>
<div class="menu-item" onclick="go('home')">Home</div>
<div class="menu-item" onclick="go('orders')">Orders</div>
<div id="logoutBtn" class="menu-item" onclick="logout()" style="display:none">Logout</div>
</div>

<!-- HOME -->
<div id="home" class="page active">
<div id="items"></div>
</div>

<!-- CART -->
<div id="cartPage" class="page">
<h3>Cart</h3>
<div id="cartItems"></div>

<input id="address" placeholder="Address">
<select id="payment">
<option value="cod">Cash on Delivery</option>
<option value="online">Pay Online</option>
</select>

<button onclick="placeOrder()">Place Order</button>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
<h3>Your Orders</h3>
<div id="orderList"></div>
</div>

<!-- TRACK -->
<div id="trackPage" class="page">
<h3>Live Tracking</h3>
<div id="map"></div>
</div>

<div id="cartBar" class="cartbar" onclick="go('cartPage')"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
});

const db=firebase.firestore();
const auth=firebase.auth();

/* MENU */
function openMenu(){sidebar.classList.add("open");overlay.style.display="block";}
function closeMenu(){sidebar.classList.remove("open");overlay.style.display="none";}

/* NAV */
function go(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
closeMenu();
}

/* LOGIN */
function handleAuth(){auth.currentUser?logout():login();}

function login(){
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider())
.catch(()=>auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider()));
}

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
if(user){
authBtn.innerText="Logout";
logoutBtn.style.display="block";
userName.innerText=user.displayName;
loadOrders(user.uid);
}else{
authBtn.innerText="Login";
logoutBtn.style.display="none";
userName.innerText="Guest";
}
});

/* CART */
let cart={};

function add(id,name,price){
if(!cart[id]) cart[id]={name,price,qty:1};
else cart[id].qty++;
render();
}

function inc(id){cart[id].qty++;render();}
function dec(id){cart[id].qty--;if(cart[id].qty<=0) delete cart[id];render();}

function render(){
document.querySelectorAll(".item").forEach(el=>{
let id=el.dataset.id;
let c=cart[id];
let box=el.querySelector(".action");

box.innerHTML=c?
`<div class="qty">
<button onclick="dec('${id}')">-</button>${c.qty}
<button onclick="inc('${id}')">+</button>
</div>`
:
`<button class="add" onclick="add('${id}','${el.dataset.name}',${el.dataset.price})">ADD</button>`;
});

let total=0,count=0;
for(let k in cart){
total+=cart[k].price*cart[k].qty;
count+=cart[k].qty;
}

cartBar.style.display=count?"block":"none";
cartBar.innerText=`${count} items • ₹${total}`;

cartItems.innerHTML="";
for(let k in cart){
let i=cart[k];
cartItems.innerHTML+=`<div class="card">${i.name} x ${i.qty}</div>`;
}
}

/* ITEMS FROM ADMIN */
db.collection("items").onSnapshot(snap=>{
items.innerHTML="";
snap.forEach(doc=>{
let i=doc.data();
items.innerHTML+=`
<div class="item" data-id="${doc.id}" data-name="${i.name}" data-price="${i.price}">
<div class="left"><b>${i.name}</b><br>₹${i.price}</div>
<div class="right">
<img src="${i.image}">
<div class="action"></div>
</div>
</div>`;
});
render();
});

/* PLACE ORDER */
function placeOrder(){
let user=auth.currentUser;
if(!user){alert("Login first");return;}

let paymentType=payment.value;

if(paymentType==="online"){
alert("Integrate Razorpay/Stripe here");
}

db.collection("orders").add({
userId:user.uid,
items:Object.values(cart),
address:address.value,
status:"pending",
createdAt:Date.now(),
deliveryLocation:null
});

cart={};
render();
go("orders");
}

/* LOAD ORDERS */
function loadOrders(uid){
db.collection("orders").where("userId","==",uid)
.onSnapshot(snap=>{
let arr=[];
snap.forEach(doc=>arr.push({id:doc.id,...doc.data()}));
arr.sort((a,b)=>b.createdAt-a.createdAt);

orderList.innerHTML="";
arr.forEach(o=>{
orderList.innerHTML+=`
<div class="card">
Order: ${o.id.slice(0,6)}<br>
Status: ${o.status}<br>
<button onclick="track('${o.id}')">Track</button>
</div>`;
});
});
}

/* TRACKING */
let map,marker;

function track(id){
go("trackPage");

map=new google.maps.Map(document.getElementById("map"),{
zoom:15,
center:{lat:17.385, lng:78.486} // default
});

marker=new google.maps.Marker({map});

db.collection("orders").doc(id)
.onSnapshot(doc=>{
let d=doc.data();
if(d.deliveryLocation){
marker.setPosition(d.deliveryLocation);
map.setCenter(d.deliveryLocation);
}
});
}
</script>

<script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDLds9mdWrFd1ap158yji-WzxRatQcYFQA"></script>

</body>
</html>
