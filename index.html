<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:sans-serif;background:#f3f3f3}

header{
background:#16a34a;color:#fff;
padding:12px;display:flex;
justify-content:space-between;align-items:center
}

.menu-btn{font-size:22px;cursor:pointer}

.login-btn{
background:#fff;color:#16a34a;
padding:5px 10px;border-radius:20px;cursor:pointer
}

.sidebar{
position:fixed;left:-250px;top:0;width:250px;height:100%;
background:#fff;transition:.3s;z-index:10;
box-shadow:2px 0 10px rgba(0,0,0,0.2)
}
.sidebar.active{left:0}

.sidebar h3{padding:20px;margin:0;background:#16a34a;color:#fff}

.sidebar a{
display:block;padding:15px;border-bottom:1px solid #eee;cursor:pointer
}

.overlay{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,0.4);display:none;z-index:5
}

.page{display:none}
.active{display:block}

.card{
background:#fff;margin:10px;padding:10px;
border-radius:10px;display:flex;justify-content:space-between
}

.add-btn{
background:#16a34a;color:#fff;
padding:5px 10px;border:none;border-radius:6px
}

.cart{
position:fixed;bottom:10px;left:10px;right:10px;
background:#16a34a;color:#fff;padding:12px;
border-radius:30px;text-align:center;font-weight:bold
}

.order{
background:#fff;margin:10px;padding:10px;border-radius:10px
}

.track{
background:#000;color:#fff;padding:5px 10px;border-radius:5px;margin-top:5px
}

#map{height:300px;margin:10px;border-radius:10px}
</style>
</head>

<body>

<header>
<div class="menu-btn" onclick="openMenu()">☰</div>
<div>Chicken Delivery</div>
<div class="login-btn" id="authBtn">Login</div>
</header>

<div class="overlay" id="overlay" onclick="closeMenu()"></div>

<div class="sidebar" id="sidebar">
<h3 id="userName">Guest</h3>
<a onclick="go('home')">Home</a>
<a onclick="go('orders')">Orders</a>
<a onclick="logout()">Logout</a>
</div>

<!-- HOME -->
<div id="home" class="page active">
<h3 style="padding:10px">Menu</h3>
<div id="menu"></div>
</div>

<!-- ORDERS -->
<div id="orders" class="page">
<h3 style="padding:10px">Your Orders</h3>
<div id="orderList"></div>
</div>

<!-- TRACK -->
<div id="trackPage" class="page">
<h3 style="padding:10px">Tracking</h3>
<div id="map"></div>
</div>

<div class="cart" id="cartBar" onclick="placeOrder()">0 items</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

<!-- 🔥 ADD YOUR GOOGLE MAP KEY HERE -->
<script src="https://maps.googleapis.com/maps/api/js?key=BLK2ZeC0XbIEylS90olGsHR6x2xrHKJ6dPXCWCtv5TMHv_2MW-ZcWh6VvQP08YCXek6YfUCCOacZQ-kqFYyoaKg"></script>

<script>

/* 🔥 ADD YOUR FIREBASE CONFIG HERE */
const firebaseConfig = {
  apiKey: "PASTE_FIREBASE_API_KEY",
  authDomain: "PASTE_PROJECT.firebaseapp.com",
  projectId: "PASTE_PROJECT_ID"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

/* MENU */
function openMenu(){
sidebar.classList.add("active");
overlay.style.display="block";
}
function closeMenu(){
sidebar.classList.remove("active");
overlay.style.display="none";
}
function go(p){
document.querySelectorAll(".page").forEach(x=>x.classList.remove("active"));
document.getElementById(p).classList.add("active");
closeMenu();
}

/* LOGIN */
authBtn.onclick=()=>{
if(auth.currentUser){
auth.signOut();
}else{
let provider=new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
}
};

function logout(){auth.signOut();}

auth.onAuthStateChanged(user=>{
if(user){
authBtn.innerText="Logout";
userName.innerText=user.displayName;
loadOrders(user.uid);
}else{
authBtn.innerText="Login";
userName.innerText="Guest";
orderList.innerHTML="";
}
});

/* MENU LOAD */
db.collection("items").onSnapshot(snap=>{
menu.innerHTML="";
snap.forEach(doc=>{
let d=doc.data();
menu.innerHTML+=`
<div class="card">
<div>
<b>${d.name}</b><br>₹${d.price}
</div>
<button class="add-btn" onclick="add('${doc.id}','${d.name}',${d.price})">ADD</button>
</div>`;
});
});

/* CART */
let cart={};

function add(id,name,price){
if(!cart[id])cart[id]={name,price,qty:0};
cart[id].qty++;
renderCart();
}

function renderCart(){
let total=0,count=0;
Object.values(cart).forEach(i=>{
total+=i.price*i.qty;
count+=i.qty;
});
cartBar.innerText=count+" items • ₹"+total;
}

/* PLACE ORDER */
function placeOrder(){
let user=auth.currentUser;
if(!user){alert("Login first");return;}

db.collection("orders").add({
userId:user.uid,
items:Object.values(cart),
status:"pending",
createdAt:Date.now(),
deliveryLocation:null
});

cart={};
renderCart();
go("orders");
}

/* LOAD ORDERS */
function loadOrders(uid){
db.collection("orders")
.where("userId","==",uid)
.onSnapshot(snap=>{

let arr=[];
snap.forEach(doc=>{
let d=doc.data();
if(!d.userId)return;
arr.push({id:doc.id,...d});
});

arr.sort((a,b)=>b.createdAt-a.createdAt);

orderList.innerHTML="";

arr.forEach(o=>{
let trackBtn="";

if(o.status==="out for delivery" && o.deliveryLocation){
trackBtn=`<button class="track" onclick="track('${o.id}')">Track</button>`;
}

orderList.innerHTML+=`
<div class="order">
<b>Order:</b> ${o.id.slice(0,6)}<br>
<b>Status:</b> ${o.status}<br>
${trackBtn}
</div>`;
});
});
}

/* MAP */
let map,marker;

function track(id){
go("trackPage");

if(!map){
map=new google.maps.Map(document.getElementById("map"),{
zoom:15,
center:{lat:17.38,lng:78.48}
});
marker=new google.maps.Marker({map});
}

db.collection("orders").doc(id)
.onSnapshot(doc=>{
let d=doc.data();
if(d.deliveryLocation){
marker.setPosition(d.deliveryLocation);
map.setCenter(d.deliveryLocation);
}
});
}
</script>

</body>
</html>
