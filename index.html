<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chicken Delivery</title>

<style>
body{margin:0;font-family:Arial;background:#f5f5f5}

/* HEADER */
header{
background:#16a34a;
color:white;
padding:15px;
display:flex;
align-items:center;
justify-content:space-between;
}

/* MENU */
.menu{
position:fixed;
left:-250px;
top:0;
width:250px;
height:100%;
background:white;
transition:.3s;
z-index:1000;
}
.menu.open{left:0}

.menu-header{
background:#16a34a;
color:white;
padding:20px;
}

.menu-item{
padding:15px;
border-bottom:1px solid #eee;
cursor:pointer;
}

/* OVERLAY */
#overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
display:none;
}

/* ITEMS */
.container{padding:15px}

.card{
background:white;
padding:10px;
margin:10px 0;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
border-radius:10px;
}

/* BUTTON */
button{
background:#16a34a;
color:white;
border:none;
padding:6px 12px;
border-radius:6px;
margin-top:5px;
}

/* CART */
.cart{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#16a34a;
color:white;
padding:12px 20px;
border-radius:30px;
font-weight:bold;
}

/* MODAL */
.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.5);
display:none;
justify-content:center;
align-items:center;
}
.box{
background:white;
padding:20px;
border-radius:10px;
width:90%;
}
</style>
</head>

<body>

<header>
<span onclick="openMenu()">☰</span>
Chicken Delivery
<button id="loginBtn">Login</button>
</header>

<div id="overlay" onclick="closeMenu()"></div>

<!-- SIDEBAR -->
<div id="menu" class="menu">
<div class="menu-header">
<h3 id="userName">Guest</h3>
<p id="userEmail">Not logged in</p>
</div>

<div class="menu-item" onclick="openOrders()">Orders</div>
<div class="menu-item" onclick="logout()">Logout</div>
</div>

<!-- ITEMS -->
<div class="container">
<h3>Menu</h3>
<div id="itemsList"></div>
</div>

<!-- CART BUTTON -->
<div id="cartBtn" class="cart" onclick="openCart()" style="display:none"></div>

<!-- CART -->
<div id="cartModal" class="modal">
<div class="box">
<h3>Cart</h3>
<div id="cartItems"></div>
<button onclick="placeOrder()">Place Order</button>
</div>
</div>

<!-- ORDERS -->
<div id="ordersModal" class="modal">
<div class="box">
<h3>Your Orders</h3>
<div id="ordersList"></div>
</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>

<script>
firebase.initializeApp({
apiKey:"AIzaSyD7fBeJ4cV82_7OaWltZ8DDvEr-Y9B_mZA",
authDomain:"chicken-delivery-app-9e4f6.firebaseapp.com",
projectId:"chicken-delivery-app-9e4f6"
});

const db=firebase.firestore();
const auth=firebase.auth();

let cart = [];
let user = null;

/* MENU */
function openMenu(){
menu.classList.add("open");
overlay.style.display="block";
}
function closeMenu(){
menu.classList.remove("open");
overlay.style.display="none";
}

/* LOGIN (FORCE GOOGLE POPUP) */
const loginBtn = document.getElementById("loginBtn");

loginBtn.onclick = () => {
const provider = new firebase.auth.GoogleAuthProvider();
auth.signInWithPopup(provider);
};

function logout(){
auth.signOut();
}

auth.onAuthStateChanged(u=>{
user = u;
if(u){
loginBtn.innerText = "Logout";
loginBtn.onclick = logout;

userName.innerText = u.displayName;
userEmail.innerText = u.email;
}else{
loginBtn.innerText = "Login";
loginBtn.onclick = () => {
auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());
};

userName.innerText = "Guest";
userEmail.innerText = "Not logged in";
}
});

/* LOAD ITEMS */
db.collection("items").onSnapshot(snap=>{
itemsList.innerHTML = "";

snap.forEach(doc=>{
let i = doc.data();

itemsList.innerHTML += `
<div class="card">
<img src="${i.image}">
<b>${i.name}</b><br>
₹${i.price}

<div id="ctrl-${i.name}"></div>
</div>`;
});

renderItems();
});

/* ADD ITEM */
function add(name,price){
cart.push({name,price});
updateCart();
renderItems();
}

/* REMOVE ONE */
function removeOne(name){
let index = cart.findIndex(i=>i.name===name);
if(index !== -1){
cart.splice(index,1);
}
updateCart();
renderItems();
}

/* COUNT */
function getQty(name){
return cart.filter(i=>i.name===name).length;
}

/* RENDER BUTTONS */
function renderItems(){
db.collection("items").get().then(snap=>{
snap.forEach(doc=>{
let i = doc.data();
let qty = getQty(i.name);

let el = document.getElementById("ctrl-"+i.name);

if(qty > 0){
el.innerHTML = `
<div style="display:flex;justify-content:center;gap:10px;margin-top:8px">
<button onclick="removeOne('${i.name}')">-</button>
${qty}
<button onclick="add('${i.name}',${i.price})">+</button>
</div>`;
}else{
el.innerHTML = `
<button onclick="add('${i.name}',${i.price})">ADD</button>`;
}
});
});
}

/* CART UPDATE */
function updateCart(){
let total = 0;

cart.forEach(i=> total += i.price);

cartBtn.style.display = cart.length ? "block" : "none";
cartBtn.innerText = `${cart.length} items • ₹${total}`;
}

/* CART MODAL */
function openCart(){
cartModal.style.display="flex";

cartItems.innerHTML = "";

let total = 0;

/* GROUP ITEMS */
let grouped = {};
cart.forEach(i=>{
if(!grouped[i.name]) grouped[i.name] = {price:i.price,qty:0};
grouped[i.name].qty++;
});

for(let k in grouped){
let item = grouped[k];
let sub = item.price * item.qty;
total += sub;

cartItems.innerHTML += `
<div style="margin-bottom:10px">
<b>${k}</b><br>
${item.qty} x ₹${item.price} = ₹${sub}
</div>`;
}

cartItems.innerHTML += `<hr><b>Total ₹${total}</b>`;
}

/* PLACE ORDER */
function placeOrder(){
if(!user){alert("Login first");return;}

db.collection("orders").add({
userId:user.uid,
userName:user.displayName,
items:cart,
status:"pending",
createdAt:firebase.firestore.FieldValue.serverTimestamp()
});

alert("Order placed!");

cart = [];
cartModal.style.display="none";
updateCart();
renderItems();
}

/* ORDERS (UNCHANGED) */
function openOrders(){
ordersModal.style.display="flex";

if(!user){
ordersList.innerHTML="Login first";
return;
}

db.collection("orders")
.where("userId","==",user.uid)
.onSnapshot(snap=>{

ordersList.innerHTML="";

snap.forEach(doc=>{
let o=doc.data();

ordersList.innerHTML+=`
<div class="card">
<b>#${doc.id.slice(0,6)}</b><br>
Status: ${o.status}
</div>`;
});
});
}

/* CLOSE MODAL */
window.onclick=e=>{
if(e.target.classList.contains("modal")){
e.target.style.display="none";
}
};

/* DOM */
const menu=document.getElementById("menu");
const overlay=document.getElementById("overlay");
const cartBtn=document.getElementById("cartBtn");
const cartModal=document.getElementById("cartModal");
const ordersModal=document.getElementById("ordersModal");
const cartItems=document.getElementById("cartItems");
const ordersList=document.getElementById("ordersList");
const userName=document.getElementById("userName");
const userEmail=document.getElementById("userEmail");
</script>

</body>
</html>
